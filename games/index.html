<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Games</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008;
    --bg2: #0b0918;
    --bg3: #100e20;
    --t1: #f0eeff;
    --t2: #a89fc7;
    --t3: #5f5680;
    --p: #7c3aed;
    --p2: #9d5bf7;
    --ac: #c084fc;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(167,139,250,0.4);
    --dim: rgba(124,58,237,0.1);
    --glow: rgba(124,58,237,0.5);
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--t1); font-family: 'Space Grotesk', sans-serif; }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('../appsbg.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.6) saturate(1.2);
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px),
      radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(0,0,8,0.75) 100%);
  }

  #loadScreen {
    position: fixed; inset: 0; z-index: 99999;
    background: #000008;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.7s ease, visibility 0.7s;
  }
  #loadScreen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
  #loadScreen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(60,0,120,0.2) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.5}50%{opacity:1} }
  .ls-corner { position: absolute; width: 36px; height: 36px; opacity: .22; }
  .ls-corner.tl{top:22px;left:22px;border-top:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.tr{top:22px;right:22px;border-top:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-corner.bl{bottom:22px;left:22px;border-bottom:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.br{bottom:22px;right:22px;border-bottom:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-logo {
    font-size: clamp(52px,10vw,90px); font-weight:700; letter-spacing:18px; text-transform:uppercase;
    color:#fff; text-shadow:0 0 40px rgba(120,80,255,0.8),0 0 80px rgba(60,0,200,0.4);
    position:relative; z-index:1;
    opacity:0; transform:translateY(18px) scale(.96);
    animation:lsLogoIn .9s cubic-bezier(.22,1,.36,1) .3s forwards;
  }
  @keyframes lsLogoIn{to{opacity:1;transform:none}}
  .ls-sub {
    font-family:'Fira Code',monospace; font-size:11px; letter-spacing:5px; color:#a78bfa;
    margin-top:16px; position:relative; z-index:1;
    opacity:0; animation:fadeUp .7s ease .9s forwards;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .ls-sub .dot{display:inline-block;animation:dotBlink 1.4s ease-in-out infinite}
  .ls-sub .dot:nth-child(2){animation-delay:.2s}.ls-sub .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotBlink{0%,80%,100%{opacity:0}40%{opacity:1}}
  .ls-bar {
    position:absolute; bottom:0; left:0; height:2px; width:0;
    background:linear-gradient(90deg,#5b21b6,#a78bfa,#60a5fa);
    box-shadow:0 0 12px rgba(167,139,250,.7);
    animation:lsBar 2.4s cubic-bezier(.4,0,.2,1) .2s forwards; z-index:1;
  }
  @keyframes lsBar{0%{width:0}60%{width:72%}85%{width:91%}100%{width:100%}}

  .tbar {
    position:fixed; top:0; left:0; right:0; height:52px; z-index:100;
    background:rgba(6,5,17,0.92); border-bottom:1px solid rgba(124,58,237,0.12);
    display:flex; align-items:center; padding:0 22px; gap:14px;
    backdrop-filter:blur(24px);
    opacity:0; transform:translateY(-8px);
    transition:opacity .5s ease .2s,transform .5s ease .2s;
  }
  .tbar.visible{opacity:1;transform:none}
  .tbar-logo{font-size:15px;font-weight:700;letter-spacing:7px;background:linear-gradient(135deg,#f0eeff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .tbar-tag{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:3px;color:var(--t3)}
  .tbar-gap{flex:1}
  .back-btn {
    display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
    color:var(--t3);font-family:'Fira Code',monospace;font-size:10px;letter-spacing:1px;
    text-decoration:none;transition:all .18s;
  }
  .back-btn:hover{border-color:rgba(167,139,250,0.4);color:var(--t1);background:var(--dim)}

  #page {
    position:relative; z-index:1;
    padding:80px 28px 48px;
    min-height:100vh;
    opacity:0; transform:translateY(12px);
    transition:opacity .6s ease .3s,transform .6s ease .3s;
  }
  #page.visible{opacity:1;transform:none}

  .page-header{text-align:center;margin-bottom:40px}
  .page-title{
    font-size:clamp(26px,5vw,46px);font-weight:700;letter-spacing:12px;text-transform:uppercase;
    color:#fff;text-shadow:0 0 32px rgba(120,80,255,0.65);margin-bottom:8px;
  }
  .page-sub{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:4px;color:var(--t3)}

  .search-wrap{max-width:320px;margin:0 auto 32px;position:relative}
  .search-wrap input {
    width:100%;height:36px;padding:0 14px 0 36px;
    background:rgba(10,5,25,0.7);border:1px solid var(--border);border-radius:8px;
    color:var(--t1);font-family:'Fira Code',monospace;font-size:11px;letter-spacing:1px;
    outline:none;backdrop-filter:blur(8px);transition:border-color .18s;
  }
  .search-wrap input:focus{border-color:var(--border-h)}
  .search-wrap input::placeholder{color:var(--t3)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}

  .games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:14px;
    max-width:1100px;margin:0 auto;
  }

  .game-card{
    background:rgba(8,4,22,0.78);
    border:1px solid var(--border);
    border-radius:10px;overflow:hidden;cursor:pointer;
    transition:border-color .2s,transform .22s,box-shadow .22s;
    backdrop-filter:blur(10px);
    position:relative;
    opacity:0;transform:translateY(14px);
    animation:cardIn .45s ease forwards;
  }
  @keyframes cardIn{to{opacity:1;transform:none}}
  .game-card:hover{border-color:var(--border-h);transform:translateY(-5px);box-shadow:0 10px 32px rgba(124,58,237,0.28)}
  .game-card::before,.game-card::after{content:'';position:absolute;width:10px;height:10px;opacity:0;transition:opacity .2s;z-index:2}
  .game-card::before{top:6px;left:6px;border-top:1.5px solid var(--ac);border-left:1.5px solid var(--ac)}
  .game-card::after{bottom:6px;right:6px;border-bottom:1.5px solid var(--ac);border-right:1.5px solid var(--ac)}
  .game-card:hover::before,.game-card:hover::after{opacity:1}

  .game-thumb{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:var(--bg3)}
  .game-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
  .game-card:hover .game-thumb img{transform:scale(1.06)}
  .thumb-overlay{
    position:absolute;inset:0;background:rgba(0,0,0,0.42);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;
  }
  .game-card:hover .thumb-overlay{opacity:1}
  .play-circle{
    width:42px;height:42px;border-radius:50%;
    background:rgba(124,58,237,0.88);border:2px solid rgba(192,132,252,0.85);
    display:flex;align-items:center;justify-content:center;font-size:15px;
    box-shadow:0 0 22px rgba(124,58,237,0.65);
    transform:scale(0.75);transition:transform .2s;
  }
  .game-card:hover .play-circle{transform:scale(1)}
  .thumb-fallback{
    width:100%;aspect-ratio:16/9;
    background:linear-gradient(135deg,rgba(91,33,182,0.25),rgba(30,10,80,0.4));
    display:flex;align-items:center;justify-content:center;font-size:38px;
    position:relative;
  }

  .game-info{padding:10px 12px 12px;display:flex;align-items:center;gap:8px}
  .game-title{flex:1;font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
  .play-btn{
    flex-shrink:0;height:25px;padding:0 11px;
    background:linear-gradient(135deg,var(--p),var(--p2));
    border:none;border-radius:6px;
    color:#fff;font-family:'Fira Code',monospace;font-size:9px;font-weight:600;letter-spacing:1px;
    cursor:pointer;transition:all .18s;box-shadow:0 2px 9px rgba(124,58,237,0.35);
  }
  .play-btn:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(124,58,237,0.6)}

  .no-results{
    grid-column:1/-1;text-align:center;padding:60px 20px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .no-results-icon{font-size:46px;opacity:.3}
  .no-results-txt{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:3px;color:var(--t3)}

  #gameModal{
    position:fixed;inset:0;z-index:500;
    background:rgba(2,1,10,0.97);
    display:none;flex-direction:column;
    backdrop-filter:blur(16px);
  }
  #gameModal.on{display:flex;animation:mIn .2s ease both}
  @keyframes mIn{from{opacity:0}to{opacity:1}}
  .gm-bar{
    height:48px;flex-shrink:0;
    background:rgba(6,5,17,0.98);border-bottom:1px solid rgba(124,58,237,0.14);
    display:flex;align-items:center;padding:0 18px;gap:10px;
  }
  .gm-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--t1);flex:1}
  .gm-btn{
    height:28px;padding:0 13px;border-radius:7px;font-family:'Fira Code',monospace;font-size:9px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .15s;
  }
  .gm-fs{border:1px solid rgba(124,58,237,0.3);background:rgba(124,58,237,0.07);color:var(--ac)}
  .gm-fs:hover{background:var(--dim)}
  .gm-close{border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);color:#f87171}
  .gm-close:hover{background:rgba(239,68,68,0.2)}
  #gameFrame{flex:1;border:none;display:block;background:#000}

  .footer{text-align:center;margin-top:48px;font-family:'Fira Code',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.18)}
  .footer span{color:rgba(167,139,250,0.4)}

  @media(max-width:600px){
    .games-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    #page{padding:68px 12px 28px}
    .tbar{padding:0 12px}
  }
</style>
</head>
<body>

<div class="bg"></div>

<div id="loadScreen">
  <div class="ls-corner tl"></div><div class="ls-corner tr"></div>
  <div class="ls-corner bl"></div><div class="ls-corner br"></div>
  <div class="ls-logo">NEXUS</div>
  <div class="ls-sub">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="ls-bar"></div>
</div>

<div class="tbar" id="tbar">
  <div class="tbar-logo">NEXUS</div>
  <div class="tbar-tag">// games</div>
  <div class="tbar-gap"></div>
  <a href="/" class="back-btn">← home</a>
</div>

<div id="page">
  <div class="page-header">
    <div class="page-title">Games</div>
    <div class="page-sub">// select a game to play</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="search games..." oninput="filterGames(this.value)">
  </div>

  <div class="games-grid" id="gamesGrid"></div>

  <div class="footer">
    -_&nbsp;<span>✦</span>&nbsp;created &amp; developed by <span>@jio</span>&nbsp;<span>✦</span>&nbsp;_-
  </div>
</div>

<div id="gameModal">
  <div class="gm-bar">
    <div class="gm-title" id="gmTitle">Game</div>
    <button class="gm-btn gm-fs" onclick="toggleFS()">⛶ Fullscreen</button>
    <button class="gm-btn gm-close" onclick="closeGame()">✕ Close</button>
  </div>
  <iframe id="gameFrame" src="" allowfullscreen allow="fullscreen; gamepad *"></iframe>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const GITHUB_USER   = 'l5fr';
  const GITHUB_REPO   = 'cgschat';
  const GITHUB_FOLDER = 'games/gmes';
  const GITHUB_BRANCH = 'main';
  // ────────────────────────────────────────────────────────

  const API_URL  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}?ref=${GITHUB_BRANCH}`;
  const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${GITHUB_FOLDER}`;

  let ALL_GAMES = [];

  async function loadGames() {
    try {
      const res   = await fetch(API_URL);
      const items = await res.json();

      ALL_GAMES = items
        .filter(item => item.type === 'dir')
        .map(item => ({
          title: item.name.replace(/[-_]/g, ' '),
          emoji: '🎮',
          // Looks for thumb.png inside each game folder — fallback to emoji if missing
          thumb: `${BASE_URL}/${item.name}/thumb.png`,
          url:   `${BASE_URL}/${item.name}/index.html`
        }));

      buildGrid(ALL_GAMES);
    } catch (e) {
      document.getElementById('gamesGrid').innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">⚠️</div>
          <div class="no-results-txt">FAILED TO LOAD GAMES</div>
        </div>`;
    }
  }

  function buildGrid(list) {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    if (!list.length) {
      grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🎮</div><div class="no-results-txt">NO GAMES FOUND</div></div>`;
      return;
    }
    list.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.style.animationDelay = (i * 0.055) + 's';
      card.onclick = () => openGame(g);

      card.innerHTML = `
        <div class="game-thumb">
          <img src="${g.thumb}" alt="${g.title}" loading="lazy"
            onerror="this.closest('.game-thumb').outerHTML='<div class=\\'thumb-fallback\\'>🎮<div class=\\'thumb-overlay\\'style=\\'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:opacity .2s\\'><div class=\\'play-circle\\'>▶</div></div></div>'">
          <div class="thumb-overlay"><div class="play-circle">▶</div></div>
        </div>
        <div class="game-info">
          <div class="game-title">${g.title}</div>
          <button class="play-btn">PLAY</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  function filterGames(q) {
    const filtered = ALL_GAMES.filter(g => g.title.toLowerCase().includes(q.toLowerCase()));
    buildGrid(filtered);
  }

  function openGame(g) {
    document.getElementById('gmTitle').textContent = g.title;
    document.getElementById('gameFrame').src = g.url;
    document.getElementById('gameModal').classList.add('on');
    document.body.style.overflow = 'hidden';
  }

  function closeGame() {
    document.getElementById('gameModal').classList.remove('on');
    document.getElementById('gameFrame').src = '';
    document.body.style.overflow = '';
  }

  function toggleFS() {
    const f = document.getElementById('gameFrame');
    if (f.requestFullscreen) f.requestFullscreen();
    else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });

  // Boot
  setTimeout(() => {
    const ls = document.getElementById('loadScreen');
    ls.classList.add('fade-out');
    setTimeout(() => {
      ls.style.display = 'none';
      document.getElementById('page').classList.add('visible');
      document.getElementById('tbar').classList.add('visible');
    }, 700);
  }, 2500);

  loadGames();
</script>
</body>
</html>
