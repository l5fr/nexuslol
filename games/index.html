<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Games</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008;
    --bg2: #0b0918;
    --bg3: #100e20;
    --t1: #f0eeff;
    --t2: #a89fc7;
    --t3: #5f5680;
    --p: #7c3aed;
    --p2: #9d5bf7;
    --ac: #c084fc;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(167,139,250,0.4);
    --dim: rgba(124,58,237,0.1);
    --glow: rgba(124,58,237,0.5);
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--t1); font-family: 'Space Grotesk', sans-serif; }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: url('../appsbg.jpg');
    background-size: cover; background-position: center;
    filter: brightness(0.6) saturate(1.2);
  }
  .bg::after {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px),
      radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(0,0,8,0.75) 100%);
  }
  #loadScreen {
    position: fixed; inset: 0; z-index: 99999;
    background: #000008;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.7s ease, visibility 0.7s;
  }
  #loadScreen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
  #loadScreen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(60,0,120,0.2) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.5}50%{opacity:1} }
  .ls-corner { position: absolute; width: 36px; height: 36px; opacity: .22; }
  .ls-corner.tl{top:22px;left:22px;border-top:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.tr{top:22px;right:22px;border-top:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-corner.bl{bottom:22px;left:22px;border-bottom:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.br{bottom:22px;right:22px;border-bottom:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-logo {
    font-size: clamp(52px,10vw,90px); font-weight:700; letter-spacing:18px; text-transform:uppercase;
    color:#fff; text-shadow:0 0 40px rgba(120,80,255,0.8),0 0 80px rgba(60,0,200,0.4);
    position:relative; z-index:1;
    opacity:0; transform:translateY(18px) scale(.96);
    animation:lsLogoIn .9s cubic-bezier(.22,1,.36,1) .3s forwards;
  }
  @keyframes lsLogoIn{to{opacity:1;transform:none}}
  .ls-sub {
    font-family:'Fira Code',monospace; font-size:11px; letter-spacing:5px; color:#a78bfa;
    margin-top:16px; position:relative; z-index:1;
    opacity:0; animation:fadeUp .7s ease .9s forwards;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .ls-sub .dot{display:inline-block;animation:dotBlink 1.4s ease-in-out infinite}
  .ls-sub .dot:nth-child(2){animation-delay:.2s}.ls-sub .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotBlink{0%,80%,100%{opacity:0}40%{opacity:1}}
  .ls-bar {
    position:absolute; bottom:0; left:0; height:2px; width:0;
    background:linear-gradient(90deg,#5b21b6,#a78bfa,#60a5fa);
    box-shadow:0 0 12px rgba(167,139,250,.7);
    animation:lsBar 2.4s cubic-bezier(.4,0,.2,1) .2s forwards; z-index:1;
  }
  @keyframes lsBar{0%{width:0}60%{width:72%}85%{width:91%}100%{width:100%}}

  /* ── TOPBAR ── */
  .tbar {
    position:fixed; top:0; left:0; right:0; height:52px; z-index:100;
    background:rgba(6,5,17,0.92); border-bottom:1px solid rgba(124,58,237,0.12);
    display:flex; align-items:center; padding:0 22px; gap:14px;
    backdrop-filter:blur(24px);
    opacity:0; transform:translateY(-8px);
    transition:opacity .5s ease .2s,transform .5s ease .2s;
  }
  .tbar.visible{opacity:1;transform:none}
  .tbar-logo{font-size:15px;font-weight:700;letter-spacing:7px;background:linear-gradient(135deg,#f0eeff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .tbar-tag{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:3px;color:var(--t3)}
  .tbar-gap{flex:1}
  .back-btn {
    display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
    color:var(--t3);font-family:'Fira Code',monospace;font-size:10px;letter-spacing:1px;
    text-decoration:none;transition:all .18s;
  }
  .back-btn:hover{border-color:rgba(167,139,250,0.4);color:var(--t1);background:var(--dim)}

  /* ── CATEGORY BAR ── */
  .cat-bar-wrap {
    position: fixed;
    top: 52px;
    left: 0; right: 0;
    z-index: 90;
    background: rgba(4, 3, 14, 0.88);
    border-bottom: 1px solid rgba(124,58,237,0.1);
    backdrop-filter: blur(20px);
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity .5s ease .35s, transform .5s ease .35s;
  }
  .cat-bar-wrap.visible { opacity: 1; transform: none; }

  .cat-bar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 18px;
    overflow-x: auto;
    scrollbar-width: none;
    height: 46px;
  }
  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    height: 32px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--t3);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .18s;
    position: relative;
    flex-shrink: 0;
  }
  .cat-btn:hover {
    background: rgba(124,58,237,0.1);
    color: var(--t1);
  }
  .cat-btn.active {
    background: rgba(124,58,237,0.15);
    color: var(--t1);
    border: 1px solid rgba(124,58,237,0.3);
  }
  .cat-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    background: var(--ac);
    border-radius: 2px 2px 0 0;
    box-shadow: 0 0 8px var(--glow);
  }

  /* Category icons — coloured to match the reference screenshot */
  .cat-icon {
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
  }
  /* Individual category accent colours */
  .cat-btn[data-cat="all"]     .cat-icon { filter: none; }
  .cat-btn[data-cat="clicker"] { --ci: #fff; }
  .cat-btn[data-cat="io"]      { --ci: #22d3ee; }
  .cat-btn[data-cat="adventure"]{ --ci: #f97316; }
  .cat-btn[data-cat="2player"] { --ci: #3b82f6; }
  .cat-btn[data-cat="shooting"]{ --ci: #eab308; }
  .cat-btn[data-cat="sports"]  { --ci: #f0eeff; }
  .cat-btn[data-cat="car"]     { --ci: #f97316; }
  .cat-btn[data-cat="puzzle"]  { --ci: #ec4899; }
  .cat-btn[data-cat="casual"]  { --ci: #a855f7; }
  .cat-btn[data-cat="kids"]    { --ci: #22c55e; }

  .cat-btn .cat-icon-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    transition: all .18s;
    flex-shrink: 0;
  }
  .cat-btn:hover .cat-icon-wrap,
  .cat-btn.active .cat-icon-wrap {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 0 10px rgba(124,58,237,0.25);
  }

  /* SVG icons coloured per category */
  .cat-svg { width: 13px; height: 13px; fill: var(--ci, #a89fc7); flex-shrink:0; }
  .cat-btn.active .cat-svg,
  .cat-btn:hover  .cat-svg { opacity: 1; }

  .cat-sep {
    width: 1px; height: 20px;
    background: rgba(255,255,255,0.07);
    flex-shrink: 0;
    margin: 0 4px;
  }

  /* ── PAGE ── */
  #page {
    position:relative; z-index:1;
    padding: 116px 28px 48px; /* extra top for topbar + cat-bar */
    min-height:100vh;
    opacity:0; transform:translateY(12px);
    transition:opacity .6s ease .3s,transform .6s ease .3s;
  }
  #page.visible{opacity:1;transform:none}
  .page-header{text-align:center;margin-bottom:32px}
  .page-title{
    font-size:clamp(26px,5vw,46px);font-weight:700;letter-spacing:12px;text-transform:uppercase;
    color:#fff;text-shadow:0 0 32px rgba(120,80,255,0.65);margin-bottom:8px;
  }
  .page-sub{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:4px;color:var(--t3)}
  .search-wrap{max-width:320px;margin:0 auto 28px;position:relative}
  .search-wrap input {
    width:100%;height:36px;padding:0 14px 0 36px;
    background:rgba(10,5,25,0.7);border:1px solid var(--border);border-radius:8px;
    color:var(--t1);font-family:'Fira Code',monospace;font-size:11px;letter-spacing:1px;
    outline:none;backdrop-filter:blur(8px);transition:border-color .18s;
  }
  .search-wrap input:focus{border-color:var(--border-h)}
  .search-wrap input::placeholder{color:var(--t3)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}

  /* Active filter pill */
  .filter-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 auto 20px;
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ac);
    opacity: 0;
    height: 0;
    overflow: hidden;
    transition: all .2s;
  }
  .filter-pill.on {
    opacity: 1;
    height: 24px;
  }
  .filter-pill-clear {
    background: none;
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 4px;
    color: var(--t3);
    font-family: 'Fira Code', monospace;
    font-size: 9px;
    padding: 1px 7px;
    cursor: pointer;
    transition: all .15s;
  }
  .filter-pill-clear:hover { color: var(--t1); border-color: var(--ac); }

  .games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:14px;
    max-width:1100px;margin:0 auto;
  }
  .game-card{
    background:rgba(8,4,22,0.78);
    border:1px solid var(--border);
    border-radius:10px;overflow:hidden;cursor:pointer;
    transition:border-color .2s,transform .22s,box-shadow .22s;
    backdrop-filter:blur(10px);
    position:relative;
    opacity:0;transform:translateY(14px);
    animation:cardIn .45s ease forwards;
  }
  @keyframes cardIn{to{opacity:1;transform:none}}
  .game-card:hover{border-color:var(--border-h);transform:translateY(-5px);box-shadow:0 10px 32px rgba(124,58,237,0.28)}
  .game-card::before,.game-card::after{content:'';position:absolute;width:10px;height:10px;opacity:0;transition:opacity .2s;z-index:2}
  .game-card::before{top:6px;left:6px;border-top:1.5px solid var(--ac);border-left:1.5px solid var(--ac)}
  .game-card::after{bottom:6px;right:6px;border-bottom:1.5px solid var(--ac);border-right:1.5px solid var(--ac)}
  .game-card:hover::before,.game-card:hover::after{opacity:1}
  .game-thumb{width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:var(--bg3)}
  .game-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s}
  .game-card:hover .game-thumb img{transform:scale(1.06)}
  .thumb-overlay{
    position:absolute;inset:0;background:rgba(0,0,0,0.42);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;
  }
  .game-card:hover .thumb-overlay{opacity:1}
  .play-circle{
    width:42px;height:42px;border-radius:50%;
    background:rgba(124,58,237,0.88);border:2px solid rgba(192,132,252,0.85);
    display:flex;align-items:center;justify-content:center;font-size:15px;
    box-shadow:0 0 22px rgba(124,58,237,0.65);
    transform:scale(0.75);transition:transform .2s;
  }
  .game-card:hover .play-circle{transform:scale(1)}
  .thumb-fallback{
    width:100%;aspect-ratio:16/9;
    background:linear-gradient(135deg,rgba(91,33,182,0.25),rgba(30,10,80,0.4));
    display:flex;align-items:center;justify-content:center;font-size:38px;
    position:relative;
  }
  .game-info{padding:10px 12px 12px;display:flex;align-items:center;gap:8px}
  .game-title{flex:1;font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
  .play-btn{
    flex-shrink:0;height:25px;padding:0 11px;
    background:linear-gradient(135deg,var(--p),var(--p2));
    border:none;border-radius:6px;
    color:#fff;font-family:'Fira Code',monospace;font-size:9px;font-weight:600;letter-spacing:1px;
    cursor:pointer;transition:all .18s;box-shadow:0 2px 9px rgba(124,58,237,0.35);
  }
  .play-btn:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(124,58,237,0.6)}
  .no-results{
    grid-column:1/-1;text-align:center;padding:60px 20px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .no-results-icon{font-size:46px;opacity:.3}
  .no-results-txt{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:3px;color:var(--t3)}

  /* ── GAME MODAL ── */
  #gameModal{
    position:fixed;inset:0;z-index:500;
    background:rgba(2,1,10,0.97);
    display:none;flex-direction:column;
    backdrop-filter:blur(16px);
  }
  #gameModal.on{display:flex;animation:mIn .2s ease both}
  @keyframes mIn{from{opacity:0}to{opacity:1}}
  .gm-bar{
    height:48px;flex-shrink:0;
    background:rgba(6,5,17,0.98);border-bottom:1px solid rgba(124,58,237,0.14);
    display:flex;align-items:center;padding:0 18px;gap:10px;
  }
  .gm-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--t1);flex:1}
  .gm-btn{
    height:28px;padding:0 13px;border-radius:7px;font-family:'Fira Code',monospace;font-size:9px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .15s;
  }
  .gm-fs{border:1px solid rgba(124,58,237,0.3);background:rgba(124,58,237,0.07);color:var(--ac)}
  .gm-fs:hover{background:var(--dim)}
  .gm-close{border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);color:#f87171}
  .gm-close:hover{background:rgba(239,68,68,0.2)}
  #gameFrame{flex:1;border:none;display:block;background:#000}

  .footer{text-align:center;margin-top:48px;font-family:'Fira Code',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.18)}
  .footer span{color:rgba(167,139,250,0.4)}

  @media(max-width:600px){
    .games-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
    #page{padding:106px 12px 28px}
    .tbar{padding:0 12px}
    .cat-btn { padding: 0 10px; font-size: 11px; }
  }
</style>
</head>
<body>
<div class="bg"></div>

<div id="loadScreen">
  <div class="ls-corner tl"></div><div class="ls-corner tr"></div>
  <div class="ls-corner bl"></div><div class="ls-corner br"></div>
  <div class="ls-logo">NEXUS</div>
  <div class="ls-sub">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="ls-bar"></div>
</div>

<!-- TOP NAV -->
<div class="tbar" id="tbar">
  <div class="tbar-logo">NEXUS</div>
  <div class="tbar-tag">// games</div>
  <div class="tbar-gap"></div>
  <a href="/" class="back-btn">← home</a>
</div>

<!-- CATEGORY BAR -->
<div class="cat-bar-wrap" id="catBarWrap">
  <div class="cat-bar" id="catBar">

    <button class="cat-btn active" data-cat="all" onclick="setCategory('all',this)">
      <div class="cat-icon-wrap">
        <!-- All / grid icon -->
        <svg class="cat-svg" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="9.5" y="1" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="1" y="9.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
          <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1" fill="currentColor"/>
        </svg>
      </div>
      All
    </button>

    <div class="cat-sep"></div>

    <button class="cat-btn" data-cat="clicker" onclick="setCategory('clicker',this)">
      <div class="cat-icon-wrap">
        <!-- Cursor / clicker -->
        <svg class="cat-svg" style="--ci:#e2e8f0" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 1L3 10.5L5.5 8.5L7.2 13L8.8 12.4L7.1 7.5H10L3 1Z" fill="var(--ci,currentColor)"/>
        </svg>
      </div>
      Clicker
    </button>

    <button class="cat-btn" data-cat="io" onclick="setCategory('io',this)">
      <div class="cat-icon-wrap">
        <!-- .IO dot -->
        <svg class="cat-svg" style="--ci:#22d3ee" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4" cy="8" r="2.2" fill="var(--ci)"/>
          <text x="7.5" y="12" font-family="monospace" font-size="8" font-weight="700" fill="var(--ci)">IO</text>
        </svg>
      </div>
      Io
    </button>

    <button class="cat-btn" data-cat="adventure" onclick="setCategory('adventure',this)">
      <div class="cat-icon-wrap">
        <!-- Compass -->
        <svg class="cat-svg" style="--ci:#f97316" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="6.5" stroke="var(--ci)" stroke-width="1.5" fill="none"/>
          <path d="M8 3.5L9.5 8L8 9L6.5 8Z" fill="var(--ci)"/>
          <path d="M8 12.5L6.5 8L8 7L9.5 8Z" fill="var(--ci)" opacity=".4"/>
        </svg>
      </div>
      Adventure
    </button>

    <button class="cat-btn" data-cat="2player" onclick="setCategory('2player',this)">
      <div class="cat-icon-wrap">
        <!-- Two people -->
        <svg class="cat-svg" style="--ci:#3b82f6" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="5.5" cy="4" r="2" fill="var(--ci)"/>
          <path d="M1.5 13c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="var(--ci)" stroke-width="1.4" fill="none"/>
          <circle cx="11.5" cy="4" r="2" fill="var(--ci)" opacity=".6"/>
          <path d="M9 13c0-2.2 1.1-3.5 2.5-3.8" stroke="var(--ci)" stroke-width="1.4" fill="none" opacity=".6"/>
        </svg>
      </div>
      2 Player
    </button>

    <button class="cat-btn" data-cat="shooting" onclick="setCategory('shooting',this)">
      <div class="cat-icon-wrap">
        <!-- Crosshair -->
        <svg class="cat-svg" style="--ci:#eab308" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="5.5" stroke="var(--ci)" stroke-width="1.4" fill="none"/>
          <circle cx="8" cy="8" r="1.8" fill="var(--ci)"/>
          <line x1="8" y1="1" x2="8" y2="4" stroke="var(--ci)" stroke-width="1.4"/>
          <line x1="8" y1="12" x2="8" y2="15" stroke="var(--ci)" stroke-width="1.4"/>
          <line x1="1" y1="8" x2="4" y2="8" stroke="var(--ci)" stroke-width="1.4"/>
          <line x1="12" y1="8" x2="15" y2="8" stroke="var(--ci)" stroke-width="1.4"/>
        </svg>
      </div>
      Shooting
    </button>

    <button class="cat-btn" data-cat="sports" onclick="setCategory('sports',this)">
      <div class="cat-icon-wrap">
        <!-- Soccer ball -->
        <svg class="cat-svg" style="--ci:#f0eeff" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="6.5" stroke="var(--ci)" stroke-width="1.4" fill="none"/>
          <polygon points="8,4 10,6.5 9,9.5 7,9.5 6,6.5" fill="var(--ci)" opacity=".8"/>
        </svg>
      </div>
      Sports
    </button>

    <button class="cat-btn" data-cat="car" onclick="setCategory('car',this)">
      <div class="cat-icon-wrap">
        <!-- Car -->
        <svg class="cat-svg" style="--ci:#fb923c" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="7" width="13" height="5" rx="1.5" fill="var(--ci)"/>
          <path d="M4 7L5.5 4H10.5L12 7" fill="var(--ci)" opacity=".7"/>
          <circle cx="4.5" cy="12.5" r="1.5" fill="#0b0918" stroke="var(--ci)" stroke-width="1"/>
          <circle cx="11.5" cy="12.5" r="1.5" fill="#0b0918" stroke="var(--ci)" stroke-width="1"/>
        </svg>
      </div>
      Car
    </button>

    <button class="cat-btn" data-cat="puzzle" onclick="setCategory('puzzle',this)">
      <div class="cat-icon-wrap">
        <!-- Puzzle piece -->
        <svg class="cat-svg" style="--ci:#ec4899" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 2h4.5v2a1.5 1.5 0 0 0 3 0V2H14v4.5h-2a1.5 1.5 0 0 0 0 3H14V14H9.5v-2a1.5 1.5 0 0 0-3 0v2H2V9.5h2a1.5 1.5 0 0 0 0-3H2Z" fill="var(--ci)"/>
        </svg>
      </div>
      Puzzle
    </button>

    <button class="cat-btn" data-cat="casual" onclick="setCategory('casual',this)">
      <div class="cat-icon-wrap">
        <!-- Game controller -->
        <svg class="cat-svg" style="--ci:#a855f7" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="5" width="14" height="7" rx="3.5" fill="var(--ci)" opacity=".3"/>
          <rect x="1" y="5" width="14" height="7" rx="3.5" stroke="var(--ci)" stroke-width="1.2" fill="none"/>
          <line x1="4.5" y1="8.5" x2="6.5" y2="8.5" stroke="var(--ci)" stroke-width="1.2"/>
          <line x1="5.5" y1="7.5" x2="5.5" y2="9.5" stroke="var(--ci)" stroke-width="1.2"/>
          <circle cx="10.5" cy="8" r="0.8" fill="var(--ci)"/>
          <circle cx="12" cy="9.2" r="0.8" fill="var(--ci)"/>
        </svg>
      </div>
      Casual
    </button>

    <button class="cat-btn" data-cat="kids" onclick="setCategory('kids',this)">
      <div class="cat-icon-wrap">
        <!-- Star / kids -->
        <svg class="cat-svg" style="--ci:#22c55e" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 1.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L8 9.8l-3.2 1.6.6-3.6L2.8 5.3l3.6-.5Z" fill="var(--ci)"/>
        </svg>
      </div>
      Kids
    </button>

  </div>
</div>

<!-- MAIN PAGE -->
<div id="page">
  <div class="page-header">
    <div class="page-title">Games</div>
    <div class="page-sub">// select a game to play</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="search games..." oninput="filterGames(this.value)">
  </div>
  <div class="filter-pill" id="filterPill">
    <span id="filterPillTxt"></span>
    <button class="filter-pill-clear" onclick="setCategory('all', document.querySelector('[data-cat=all]'))">✕ clear</button>
  </div>
  <div class="games-grid" id="gamesGrid"></div>
  <div class="footer">
    -_&nbsp;<span>✦</span>&nbsp;created &amp; developed by <span>@jio</span>&nbsp;<span>✦</span>&nbsp;_-
  </div>
</div>

<!-- GAME MODAL -->
<div id="gameModal">
  <div class="gm-bar">
    <div class="gm-title" id="gmTitle">Game</div>
    <button class="gm-btn gm-fs" onclick="toggleFS()">⛶ Fullscreen</button>
    <button class="gm-btn gm-close" onclick="closeGame()">✕ Close</button>
  </div>
  <iframe id="gameFrame" src="" allowfullscreen allow="fullscreen; gamepad *"></iframe>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
const GITHUB_USER   = 'l5fr';
const GITHUB_REPO   = 'nexuslol';
const GITHUB_FOLDER = 'games';
const GITHUB_BRANCH = 'main';
  // ────────────────────────────────────────────────────────

  const API_URL  = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}?ref=${GITHUB_BRANCH}`;
  const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}/${GITHUB_FOLDER}`;

  let ALL_GAMES = [];
  let currentCat = 'all';
  let currentSearch = '';

  // ── Category keyword map ──
  // Add game folder-name keywords to each category so the filter actually works.
  // Adjust these keywords to match your actual game folder names.
  const CAT_KEYWORDS = {
    clicker:   ['clicker','click','idle','tap','cookie'],
    io:        ['io','slither','agar','.io'],
    adventure: ['adventure','quest','rpg','dungeon','platformer','jump','run'],
    '2player': ['2player','two','player2','pvp','versus','vs','duel'],
    shooting:  ['shoot','shooter','gun','bullet','aim','sniper','fps'],
    sports:    ['sport','soccer','football','basketball','tennis','golf','baseball'],
    car:       ['car','race','racing','drive','drift','kart','speed'],
    puzzle:    ['puzzle','match','block','tetris','sudoku','word','crossword'],
    casual:    ['casual','casual','flappy','endless','hyper','tap'],
    kids:      ['kids','kid','baby','animal','colour','color','simple'],
  };

  async function loadGames() {
    try {
      const res   = await fetch(API_URL);
      const items = await res.json();
      ALL_GAMES = items
        .filter(item => item.type === 'dir')
        .map(item => ({
          title: item.name.replace(/[-_]/g, ' '),
          slug:  item.name.toLowerCase(),
          thumb: `${BASE_URL}/${item.name}/thumb.png`,
          url:   `${BASE_URL}/${item.name}/index.html`
        }));
      applyFilters();
    } catch (e) {
      document.getElementById('gamesGrid').innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">⚠️</div>
          <div class="no-results-txt">FAILED TO LOAD GAMES</div>
        </div>`;
    }
  }

  function gameFitsCat(game, cat) {
    if (cat === 'all') return true;
    const keywords = CAT_KEYWORDS[cat] || [];
    return keywords.some(kw => game.slug.includes(kw) || game.title.toLowerCase().includes(kw));
  }

  function applyFilters() {
    let list = ALL_GAMES;
    if (currentCat !== 'all') list = list.filter(g => gameFitsCat(g, currentCat));
    if (currentSearch) list = list.filter(g => g.title.toLowerCase().includes(currentSearch.toLowerCase()));
    buildGrid(list);

    // Pill
    const pill = document.getElementById('filterPill');
    const pillTxt = document.getElementById('filterPillTxt');
    if (currentCat !== 'all') {
      pill.classList.add('on');
      pillTxt.textContent = `SHOWING: ${currentCat.toUpperCase()} — ${list.length} game${list.length !== 1 ? 's' : ''}`;
    } else {
      pill.classList.remove('on');
    }
  }

  function setCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function filterGames(q) {
    currentSearch = q;
    applyFilters();
  }

  function buildGrid(list) {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = '';
    if (!list.length) {
      grid.innerHTML = `<div class="no-results"><div class="no-results-icon">🎮</div><div class="no-results-txt">NO GAMES FOUND</div></div>`;
      return;
    }
    list.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.style.animationDelay = (i * 0.055) + 's';
      card.onclick = () => openGame(g);
      card.innerHTML = `
        <div class="game-thumb">
          <img src="${g.thumb}" alt="${g.title}" loading="lazy"
            onerror="this.closest('.game-thumb').outerHTML='<div class=\\'thumb-fallback\\'>🎮<div class=\\'thumb-overlay\\'style=\\'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);opacity:0;transition:opacity .2s\\'><div class=\\'play-circle\\'>▶</div></div></div>'">
          <div class="thumb-overlay"><div class="play-circle">▶</div></div>
        </div>
        <div class="game-info">
          <div class="game-title">${g.title}</div>
          <button class="play-btn">PLAY</button>
        </div>`;
      grid.appendChild(card);
    });
  }

  function openGame(g) {
    document.getElementById('gmTitle').textContent = g.title;
    document.getElementById('gameFrame').src = g.url;
    document.getElementById('gameModal').classList.add('on');
    document.body.style.overflow = 'hidden';
  }
  function closeGame() {
    document.getElementById('gameModal').classList.remove('on');
    document.getElementById('gameFrame').src = '';
    document.body.style.overflow = '';
  }
  function toggleFS() {
    const f = document.getElementById('gameFrame');
    if (f.requestFullscreen) f.requestFullscreen();
    else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGame(); });

  // Boot
  setTimeout(() => {
    const ls = document.getElementById('loadScreen');
    ls.classList.add('fade-out');
    setTimeout(() => {
      ls.style.display = 'none';
      document.getElementById('page').classList.add('visible');
      document.getElementById('tbar').classList.add('visible');
      document.getElementById('catBarWrap').classList.add('visible');
    }, 700);
  }, 2500);

  loadGames();
</script>
</body>
</html>
