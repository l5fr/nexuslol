<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000008; --bg2: #0b0918; --bg3: #100e20;
    --t1: #f0eeff; --t2: #a89fc7; --t3: #5f5680;
    --p: #7c3aed; --p2: #9d5bf7; --ac: #c084fc;
    --border: rgba(255,255,255,0.08); --border-h: rgba(167,139,250,0.4);
    --dim: rgba(124,58,237,0.1);
  }
  html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(60,0,120,0.1) 0%, transparent 60%); }
  .container { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; padding: 0 16px; }
  .header { display: flex; align-items: center; gap: 10px; padding: 14px 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--p), var(--p2)); display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 14px rgba(124,58,237,0.5); }
  .header-title { font-size: 14px; font-weight: 700; letter-spacing: 4px; color: var(--t1); }
  .header-sub { font-family: 'Fira Code', monospace; font-size: 9px; letter-spacing: 2px; color: var(--t3); }
  .header-gap { flex: 1; }
  .status { display: flex; align-items: center; gap: 6px; font-family: 'Fira Code', monospace; font-size: 9px; color: var(--t3); letter-spacing: 1px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .messages { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: rgba(124,58,237,0.3) transparent; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 4px; }
  .msg { display: flex; gap: 10px; animation: msgIn .3s ease both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; margin-top: 2px; }
  .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--p), var(--p2)); box-shadow: 0 0 10px rgba(124,58,237,0.4); }
  .msg.user .msg-avatar { background: rgba(255,255,255,0.07); border: 1px solid var(--border); }
  .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; color: var(--t1); }
  .msg.ai .msg-bubble { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); border-top-left-radius: 4px; }
  .msg.user .msg-bubble { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-top-right-radius: 4px; text-align: right; }
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--ac); opacity: 0.4; animation: typingDot 1.2s ease-in-out infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }
  @keyframes typingDot { 0%,60%,100%{opacity:.2;transform:none} 30%{opacity:1;transform:translateY(-4px)} }
  .welcome { text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .welcome-icon { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--p), var(--p2)); display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 0 30px rgba(124,58,237,0.5); animation: iconFloat 3s ease-in-out infinite; }
  @keyframes iconFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .welcome h2 { font-size: 20px; font-weight: 700; letter-spacing: 3px; color: var(--t1); }
  .welcome p { font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: 2px; color: var(--t3); }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .suggestion { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: rgba(124,58,237,0.07); color: var(--t2); font-size: 11px; cursor: pointer; transition: all .18s; font-family: 'Fira Code', monospace; letter-spacing: 0.5px; }
  .suggestion:hover { border-color: var(--border-h); color: var(--t1); background: var(--dim); }
  .input-area { padding: 12px 0 16px; flex-shrink: 0; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; background: rgba(10,5,25,0.8); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; transition: border-color .18s; backdrop-filter: blur(10px); }
  .input-row:focus-within { border-color: var(--border-h); }
  #userInput { flex: 1; background: none; border: none; outline: none; color: var(--t1); font-family: 'Space Grotesk', sans-serif; font-size: 13px; resize: none; max-height: 120px; min-height: 20px; line-height: 1.5; }
  #userInput::placeholder { color: var(--t3); }
  #sendBtn { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; background: linear-gradient(135deg, var(--p), var(--p2)); border: none; cursor: pointer; color: #fff; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .18s; box-shadow: 0 2px 10px rgba(124,58,237,0.4); }
  #sendBtn:hover { transform: scale(1.08); box-shadow: 0 4px 18px rgba(124,58,237,0.6); }
  #sendBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .input-hint { font-family: 'Fira Code', monospace; font-size: 9px; color: var(--t3); letter-spacing: 1px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <div class="header">
    <div class="header-icon">🤖</div>
    <div>
      <div class="header-title">NEXUS AI</div>
      <div class="header-sub">// powered by groq</div>
    </div>
    <div class="header-gap"></div>
    <div class="status"><div class="status-dot"></div>ONLINE</div>
  </div>
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>NEXUS AI</h2>
      <p>// ask me anything</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">What can you do?</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Tell me a joke</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Help me with homework</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Write me a story</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Explain black holes</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Roast me 😂</div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">ENTER to send &nbsp;·&nbsp; SHIFT+ENTER for new line</div>
  </div>
</div>
<script>
  // !! ONLY EDIT THIS LINE — paste your NEW Groq key between the quotes !!
  const API_KEY = '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';
  // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

  const history = [];

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function sendSuggestion(el) {
    document.getElementById('userInput').value = el.textContent;
    sendMessage();
  }

  function addMsg(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    addTyping();
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'You are NEXUS AI, a helpful and friendly AI assistant built into the NEXUS website. Be concise, engaging, and occasionally playful. Keep responses relatively short unless asked for detail.' },
            ...history
          ],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      if (data.error) {
        document.getElementById('typing')?.remove();
        addMsg('ai', 'API Error: ' + data.error.message);
      } else {
        const reply = data.choices?.[0]?.message?.content || 'No response received.';
        document.getElementById('typing')?.remove();
        addMsg('ai', reply);
        history.push({ role: 'assistant', content: reply });
      }
    } catch (e) {
      document.getElementById('typing')?.remove();
      addMsg('ai', 'Network error: ' + e.message);
    }
    btn.disabled = false;
    document.getElementById('messages').scrollTop = 999999;
  }
</script>
</body>
</html>
