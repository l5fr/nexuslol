<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Tap Road</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100vh; overflow: hidden; background: #000; }
        body { display: flex; flex-direction: column; }
        .game-container { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .game-bar {
            height: 40px; background: #0b0918; border-top: 1px solid #7c3aed33;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; color: #a89fc7; font-family: monospace;
        }
        .btn {
            background: #7c3aed1a; border: 1px solid #7c3aed33;
            color: #c084fc; padding: 4px 12px; border-radius: 6px;
            font-size: 11px; cursor: pointer; text-decoration: none;
        }
        .btn:hover { background: #7c3aed33; }
    </style>
</head>
<body>
    <div class="game-container">
        <iframe 
            src="https://www.crazygames.com/embed/tap-road" 
            allow="autoplay; fullscreen; gamepad; microphone; camera"
            sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-presentation allow-orientation-lock allow-pointer-lock"
            allowfullscreen>
        </iframe>
    </div>
    <div class="game-bar">
        <span>🎮 TAP ROAD</span>
        <div>
            <button class="btn" onclick="document.querySelector('iframe').requestFullscreen()">⛶ FULLSCREEN</button>
            <a href="index.html" class="btn">← BACK</a>
        </div>
    </div>
</body>
</html>
