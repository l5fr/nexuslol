<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Tap Road</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000008;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        /* Game container */
        .game-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        
        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #000008;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 30px rgba(124,58,237,0.8);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        .loading-text {
            color: #a78bfa;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            letter-spacing: 4px;
        }
        
        .loading-text .dot {
            display: inline-block;
            animation: dotBlink 1.4s ease-in-out infinite;
        }
        
        .loading-text .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-text .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes dotBlink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        
        /* Game info bar */
        .game-info-bar {
            height: 40px;
            background: rgba(6,5,17,0.98);
            border-top: 1px solid rgba(124,58,237,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }
        
        .game-name {
            color: #a89fc7;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            font-family: 'Fira Code', monospace;
        }
        
        .game-controls {
            display: flex;
            gap: 12px;
        }
        
        .control-btn {
            background: rgba(124,58,237,0.1);
            border: 1px solid rgba(124,58,237,0.2);
            color: #c084fc;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Fira Code', monospace;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .control-btn:hover {
            background: rgba(124,58,237,0.2);
            border-color: rgba(124,58,237,0.4);
            color: #f0eeff;
        }
        
        /* Error message */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #f87171;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .error-message h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .error-message p {
            color: #a89fc7;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-logo">TAP ROAD</div>
        <div class="loading-text">
            LOADING GAME<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        </div>
    </div>

    <!-- Game container -->
    <div class="game-container">
        <div class="game-wrapper">
            <iframe 
                class="game-iframe" 
                id="game-area" 
                src="https://tap-road.1games.io/?d" 
                width="100%" 
                height="100%" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; gamepad; fullscreen"
                sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-orientation-lock allow-pointer-lock allow-presentation allow-downloads"
                scrolling="no" 
                frameborder="0" 
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true">
            </iframe>
        </div>
        
        <!-- Error message (shown if iframe fails to load) -->
        <div class="error-message" id="errorMessage">
            <h3>⚠️ Game Loading Error</h3>
            <p>Try refreshing the page or playing in fullscreen mode.</p>
        </div>
    </div>

    <!-- Game info bar -->
    <div class="game-info-bar">
        <div class="game-name">
            <span>🎮 TAP ROAD</span>
            <span style="color: #5f5680; margin-left: 8px;">// v1.0</span>
        </div>
        <div class="game-controls">
            <button class="control-btn" onclick="toggleFullscreen()">
                <span>⛶</span> FULLSCREEN
            </button>
            <button class="control-btn" onclick="refreshGame()">
                <span>↻</span> REFRESH
            </button>
            <a href="index.html" class="control-btn">
                <span>←</span> BACK
            </a>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('game-area');
        const overlay = document.getElementById('loadingOverlay');
        const errorMsg = document.getElementById('errorMessage');
        
        // Handle iframe load
        iframe.addEventListener('load', () => {
            setTimeout(() => {
                overlay.classList.add('fade-out');
            }, 1000);
        });
        
        // Handle iframe error
        iframe.addEventListener('error', () => {
            overlay.classList.add('fade-out');
            errorMsg.classList.add('show');
            console.log('Game failed to load - might be blocked by the game provider');
        });
        
        // Fallback: hide overlay after 5 seconds even if game doesn't trigger load
        setTimeout(() => {
            if (!overlay.classList.contains('fade-out')) {
                overlay.classList.add('fade-out');
            }
        }, 5000);
        
        // Fullscreen function
        function toggleFullscreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }
        
        // Refresh game
        function refreshGame() {
            overlay.classList.remove('fade-out');
            errorMsg.classList.remove('show');
            iframe.src = iframe.src;
        }
        
        // Handle escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });
        
        // Prevent right-click on iframe (optional)
        iframe.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
        
        // Get game name from URL parameters (if any)
        const urlParams = new URLSearchParams(window.location.search);
        const gameName = urlParams.get('game') || 'TAP ROAD';
        document.querySelector('.game-name span:first-child').textContent = `🎮 ${gameName.toUpperCase()}`;
        
        // Update page title
        document.title = `NEXUS — ${gameName}`;
    </script>
</body>
</html>
