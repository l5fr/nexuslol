<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000008;
    --purple: #3a0060;
    --purple2: #5b0099;
    --blue: #0000cc;
    --blue2: #0033ff;
    --glow-blue: rgba(0, 80, 255, 0.6);
    --glow-purple: rgba(80, 0, 160, 0.5);
    --t1: #f0eeff;
    --t2: #a89fc7;
    --t3: #5f5680;
    --border: rgba(255,255,255,0.12);
    --border-hover: rgba(255,255,255,0.35);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--t1);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url('appsbg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(0.7) saturate(1.2);
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px),
      radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(0,0,8,0.65) 100%);
  }

  /* ── LOAD SCREEN ── */
  #loadScreen {
    position: fixed; inset: 0; z-index: 99999;
    background: #000008;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.7s ease, visibility 0.7s;
  }
  #loadScreen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
  #loadScreen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(60,0,120,0.2) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .ls-corner { position: absolute; width: 36px; height: 36px; opacity: .25; }
  .ls-corner.tl{top:22px;left:22px;border-top:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.tr{top:22px;right:22px;border-top:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-corner.bl{bottom:22px;left:22px;border-bottom:1px solid #a78bfa;border-left:1px solid #a78bfa}
  .ls-corner.br{bottom:22px;right:22px;border-bottom:1px solid #a78bfa;border-right:1px solid #a78bfa}
  .ls-logo {
    font-size: clamp(52px,10vw,90px); font-weight:700; letter-spacing:18px; text-transform:uppercase;
    color:#fff; text-shadow:0 0 40px rgba(120,80,255,0.8),0 0 80px rgba(60,0,200,0.4);
    position:relative; z-index:1; opacity:0; transform:translateY(18px) scale(.96);
    animation:lsLogoIn .9s cubic-bezier(.22,1,.36,1) .3s forwards;
  }
  @keyframes lsLogoIn{to{opacity:1;transform:none}}
  .ls-sub {
    font-family:'Fira Code',monospace; font-size:11px; letter-spacing:5px; color:#a78bfa;
    margin-top:16px; position:relative; z-index:1; opacity:0; animation:fadeUp .7s ease .9s forwards;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .ls-sub .dot{display:inline-block;animation:dotBlink 1.4s ease-in-out infinite}
  .ls-sub .dot:nth-child(2){animation-delay:.2s}.ls-sub .dot:nth-child(3){animation-delay:.4s}
  @keyframes dotBlink{0%,80%,100%{opacity:0}40%{opacity:1}}
  .ls-bar {
    position:absolute; bottom:0; left:0; height:2px; width:0;
    background:linear-gradient(90deg,#5b21b6,#a78bfa,#60a5fa);
    box-shadow:0 0 12px rgba(167,139,250,.7);
    animation:lsBar 2.4s cubic-bezier(.4,0,.2,1) .2s forwards; z-index:1;
  }
  @keyframes lsBar{0%{width:0}60%{width:72%}85%{width:91%}100%{width:100%}}

  /* ── MAIN PAGE ── */
  #page {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transform: translateY(12px); pointer-events: none;
    transition: opacity .7s ease .1s, transform .7s ease .1s;
  }
  #page.visible { opacity: 1; transform: none; pointer-events: all; }

  .logo {
    font-size: clamp(52px,9vw,88px); font-weight:700; letter-spacing:16px; text-transform:uppercase;
    color:#fff; text-shadow:0 0 30px rgba(120,80,255,0.7),0 0 60px rgba(60,0,200,0.35),0 2px 0 rgba(0,0,0,0.5);
    margin-bottom:10px; animation:logoGlow 4s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%,100%{text-shadow:0 0 30px rgba(120,80,255,0.7),0 0 60px rgba(60,0,200,0.35),0 2px 0 rgba(0,0,0,0.5)}
    50%{text-shadow:0 0 50px rgba(140,100,255,1),0 0 100px rgba(80,20,220,0.5),0 2px 0 rgba(0,0,0,0.5)}
  }
  .version {
    font-family:'Fira Code',monospace; font-size:11px; letter-spacing:4px;
    color:rgba(255,255,255,0.45); margin-bottom:52px;
  }

  /* ── CATEGORY BOXES ── */
  .categories { display:flex; gap:20px; align-items:center; justify-content:center; }
  .cat-box {
    width:160px; height:160px;
    background:rgba(10,5,25,0.72); border:1px solid var(--border); border-radius:4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    cursor:pointer; text-decoration:none; color:var(--t1);
    position:relative; overflow:hidden;
    transition:border-color .25s,background .25s,transform .2s;
    backdrop-filter:blur(10px);
  }
  .cat-box::before,.cat-box::after{content:'';position:absolute;width:14px;height:14px;opacity:0;transition:opacity .25s}
  .cat-box::before{top:6px;left:6px;border-top:1.5px solid #a78bfa;border-left:1.5px solid #a78bfa}
  .cat-box::after{bottom:6px;right:6px;border-bottom:1.5px solid #a78bfa;border-right:1.5px solid #a78bfa}
  .cat-box:hover{border-color:var(--border-hover);background:rgba(20,8,50,0.85);transform:translateY(-3px)}
  .cat-box:hover::before,.cat-box:hover::after{opacity:1}
  .cat-box .glow{position:absolute;inset:0;opacity:0;transition:opacity .3s;background:radial-gradient(ellipse 80% 80% at 50% 50%,rgba(120,80,255,0.1),transparent 70%)}
  .cat-box:hover .glow{opacity:1}
  .cat-icon{font-size:44px;line-height:1;filter:drop-shadow(0 0 8px rgba(167,139,250,0.4));transition:transform .2s,filter .2s;position:relative;z-index:1}
  .cat-box:hover .cat-icon{transform:scale(1.08);filter:drop-shadow(0 0 16px rgba(167,139,250,0.7))}
  .cat-label{font-size:13px;font-weight:600;letter-spacing:4px;text-transform:lowercase;color:rgba(255,255,255,0.9);position:relative;z-index:1;transition:color .2s}
  .cat-box:hover .cat-label{color:#fff}

  .footer{margin-top:52px;font-family:'Fira Code',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-align:center}
  .footer span{color:rgba(167,139,250,0.5)}

  /* ── UNDER CONSTRUCTION OVERLAY ── */
  #ucOverlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(2, 1, 10, 0.93);
    backdrop-filter: blur(18px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  #ucOverlay.on { opacity: 1; pointer-events: all; }

  .uc-box {
    background: rgba(10, 5, 25, 0.85);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 18px;
    padding: 48px 52px;
    text-align: center;
    position: relative;
    max-width: 440px;
    width: 90vw;
    transform: scale(0.92) translateY(16px);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 80px rgba(124,58,237,0.15), 0 0 200px rgba(124,58,237,0.05);
  }
  #ucOverlay.on .uc-box { transform: scale(1) translateY(0); }

  /* Corner accents */
  .uc-box::before, .uc-box::after { content:''; position:absolute; width:18px; height:18px; }
  .uc-box::before{top:10px;left:10px;border-top:1.5px solid rgba(167,139,250,0.5);border-left:1.5px solid rgba(167,139,250,0.5)}
  .uc-box::after{bottom:10px;right:10px;border-bottom:1.5px solid rgba(167,139,250,0.5);border-right:1.5px solid rgba(167,139,250,0.5)}

  .uc-icon {
    font-size: 58px;
    margin-bottom: 20px;
    display: block;
    animation: ucBob 3s ease-in-out infinite;
    filter: drop-shadow(0 0 16px rgba(250,204,21,0.5));
  }
  @keyframes ucBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .uc-title {
    font-size: 22px; font-weight: 700; letter-spacing: 8px; text-transform: uppercase;
    color: #fff; margin-bottom: 10px;
    text-shadow: 0 0 24px rgba(120,80,255,0.6);
  }

  .uc-sub {
    font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: 3px;
    color: rgba(167,139,250,0.6); margin-bottom: 22px;
  }

  .uc-msg {
    font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.7;
    font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 1px;
    margin-bottom: 32px;
  }

  /* Progress bar */
  .uc-bar-wrap {
    height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px;
    overflow: hidden; margin-bottom: 32px;
  }
  .uc-bar {
    height: 100%; width: 35%;
    background: linear-gradient(90deg, #5b21b6, #a78bfa, #60a5fa);
    box-shadow: 0 0 10px rgba(167,139,250,0.6);
    border-radius: 2px;
    animation: ucBarPulse 2.5s ease-in-out infinite;
  }
  @keyframes ucBarPulse { 0%,100%{width:30%;opacity:0.7} 50%{width:45%;opacity:1} }

  .uc-close {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 24px; border-radius: 9px;
    border: 1px solid rgba(124,58,237,0.35);
    background: rgba(124,58,237,0.1);
    color: #c084fc; font-family: 'Fira Code', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    cursor: pointer; transition: all .2s;
  }
  .uc-close:hover { background: rgba(124,58,237,0.22); border-color: rgba(167,139,250,0.6); color: #fff; }

  @media(max-width:480px){
    .categories{gap:14px}
    .cat-box{width:136px;height:136px}
    .cat-icon{font-size:36px}
    .logo{letter-spacing:10px}
    .uc-box{padding:36px 28px}
    .uc-title{font-size:18px;letter-spacing:5px}
  }
</style>
</head>
<body>

<div class="bg"></div>

<div id="loadScreen">
  <div class="ls-corner tl"></div><div class="ls-corner tr"></div>
  <div class="ls-corner bl"></div><div class="ls-corner br"></div>
  <div class="ls-logo">NEXUS</div>
  <div class="ls-sub">LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="ls-bar"></div>
</div>

<div id="page">
  <div class="logo">nexus</div>
  <div class="version">version 1.0 / release build</div>

  <div class="categories">
    <!-- Games — shows under construction -->
    <div class="cat-box" onclick="showUC()">
      <div class="glow"></div>
      <div class="cat-icon">🎮</div>
      <div class="cat-label">games</div>
    </div>

    <!-- Chat -->
    <a href="https://nexuslol.vercel.app/unc" class="cat-box">
      <div class="glow"></div>
      <div class="cat-icon">💬</div>
      <div class="cat-label">chat</div>
    </a>
  </div>

  <div class="footer">
    -_&nbsp;<span>✦</span>&nbsp;website created &amp; developed by <span>@jio</span>&nbsp;<span>✦</span>&nbsp;_-
  </div>
</div>



<script>
  function showUC() {
    document.getElementById('ucOverlay').classList.add('on');
  }
  function hideUC() {
    document.getElementById('ucOverlay').classList.remove('on');
  }
  function handleOverlayClick(e) {
    // close if clicking the backdrop, not the box
    if (e.target === document.getElementById('ucOverlay')) hideUC();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') hideUC(); });

  setTimeout(() => {
    const ls = document.getElementById('loadScreen');
    ls.classList.add('fade-out');
    setTimeout(() => {
      ls.style.display = 'none';
      document.getElementById('page').classList.add('visible');
    }, 700);
  }, 2500);
</script>
</body>
</html>
